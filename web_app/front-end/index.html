<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infant Support System - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-5 col-lg-4">
                <div class="card shadow-sm mt-5">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-1">Infant Support System</h3>
                        <p class="text-center text-muted mb-4">Nurse Portal</p>

                        <div id="loginError" class="alert alert-danger d-none"></div>

                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" placeholder="Enter username">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" placeholder="Enter password">
                        </div>
                        <button class="btn btn-primary w-100" id="loginBtn" onclick="handleLogin()">Log In</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // If already logged in, go to dashboard
        async function checkExisting() {
            const session = await API.checkSession();
            if (session.loggedIn) {
                window.location.href = "dashboard.html";
            }
        }
        checkExisting();

        async function handleLogin() {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;
            const errorDiv = document.getElementById("loginError");

            if (!username || !password) {
                errorDiv.textContent = "Please enter both username and password.";
                errorDiv.classList.remove("d-none");
                return;
            }

            const result = await API.login(username, password);

            if (result.success) {
                window.location.href = "dashboard.html";
            } else {
                errorDiv.textContent = result.message || "Invalid username or password.";
                errorDiv.classList.remove("d-none");
            }
        }

        // Allow Enter key to submit
        document.getElementById("password").addEventListener("keyup", function(e) {
            if (e.key === "Enter") handleLogin();
        });
    </script>
</body>
</html>
